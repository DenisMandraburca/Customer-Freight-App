<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted - Customer Freight App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .banned-bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(12px);
            -webkit-filter: blur(12px);
            transform: scale(1.05);
        }
        .banned-bg-placeholder {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
        }
        .banned-popup {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 1rem;
        }
        .banned-popup-box {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 28rem;
            width: 100%;
            padding: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden">
    <!-- Blurred background: image from Script Property BANNED_LAYOUT (URL), or placeholder if not set -->
    <div id="bannedBg" class="banned-bg <?= bannedLayoutUrl ? '' : 'banned-bg-placeholder' ?>"></div>
    <div class="banned-popup">
        <div class="banned-popup-box">
            <p class="text-gray-800 text-lg mb-6">You are not allowed to visit this portal.<br>Contact Account Manager</p>
            <button type="button" id="bannedOkBtn" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">OK</button>
        </div>
    </div>
    <script>
        (function() {
            var bannedLayoutUrl = <?!= JSON.stringify(bannedLayoutUrl || '') ?>;
            var bgEl = document.getElementById('bannedBg');
            if (bannedLayoutUrl && bgEl) {
                bgEl.style.backgroundImage = 'url(' + JSON.stringify(bannedLayoutUrl) + ')';
            }
            document.getElementById('bannedOkBtn').addEventListener('click', function() {
                document.querySelector('.banned-popup-box').focus();
            });
        })();
    </script>
</body>
</html>
