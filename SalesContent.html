<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Section 1: New Load Form (Always Visible) -->
    <div class="bg-white rounded-lg shadow-md mb-8">
        <div class="p-6">
            <button 
                id="toggleFormBtn" 
                class="w-full flex justify-between items-center text-left text-xl font-semibold text-gray-800 hover:text-blue-600 transition-colors"
                onclick="toggleForm()"
            >
                <span>New Load Form</span>
                <svg id="formToggleIcon" class="w-6 h-6 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
            
            <div id="loadForm" class="mt-6 hidden">
                <form id="newLoadForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Customer Dropdown -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Customer *</label>
                            <select id="customer" name="customer" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                                <option value="">Select Customer</option>
                            </select>
                        </div>

                        <!-- Load Ref Number -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Load Reference #</label>
                            <input type="text" id="loadRef" name="loadRef" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="Optional">
                        </div>

                        <!-- Pickup City -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Pickup City *</label>
                            <input type="text" id="puCity" name="puCity" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <!-- Pickup State -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Pickup State *</label>
                            <input type="text" id="puState" name="puState" required maxlength="2" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., CA">
                        </div>

                        <!-- Pickup Date -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Pickup Date *</label>
                            <input type="date" id="puDate" name="puDate" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <!-- Delivery City -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Delivery City *</label>
                            <input type="text" id="delCity" name="delCity" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <!-- Delivery State -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Delivery State *</label>
                            <input type="text" id="delState" name="delState" required maxlength="2" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., TX">
                        </div>

                        <!-- Delivery Date -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Date *</label>
                            <input type="date" id="delDate" name="delDate" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <!-- Rate -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Rate ($) *</label>
                            <input type="number" id="rate" name="rate" required step="0.01" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" oninput="calculateRPM()">
                        </div>

                        <!-- Miles -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Miles *</label>
                            <input type="number" id="miles" name="miles" required step="0.01" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" oninput="calculateRPM()">
                        </div>
                    </div>

                    <!-- RPM Display -->
                    <div id="rpmDisplay" class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-md hidden">
                        <p class="text-sm font-medium text-blue-800">
                            Rate Per Mile (RPM): <span id="rpmValue" class="font-bold text-lg">$0.00</span>
                        </p>
                    </div>

                    <!-- Notes -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                        <textarea id="notes" name="notes" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="Additional information..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex justify-end pt-4">
                        <button 
                            type="submit" 
                            class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
                        >
                            Post Load
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Section 2: Tab System -->
    <div class="bg-white rounded-lg shadow-md">
        <div class="border-b border-gray-200">
            <nav class="flex -mb-px">
                <button 
                    id="tabActive" 
                    onclick="switchSalesTab('active')"
                    class="py-4 px-6 text-sm font-medium text-blue-600 border-b-2 border-blue-600"
                >
                    Active Loads
                </button>
                <button 
                    id="tabCompleted" 
                    onclick="switchSalesTab('completed')"
                    class="py-4 px-6 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 border-transparent"
                >
                    Completed Loads
                </button>
            </nav>
        </div>

        <!-- Tab 1: Active Loads -->
        <div id="activeLoadsTab" class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Active Loads</h2>
                <div id="activeLoadsLoading" class="text-xs text-gray-500 opacity-0 transition-opacity">Refreshing...</div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ref#</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Route</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Dates</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rate/RPM</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="activeLoadsTableBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="8" class="px-4 py-8 text-center text-gray-500">Loading loads...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tab 2: Completed Loads -->
        <div id="completedLoadsTab" class="p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Completed Loads</h2>
                <div id="completedLoadsLoading" class="text-xs text-gray-500 opacity-0 transition-opacity">Refreshing...</div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ref#</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Route</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Dates</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rate/RPM</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="completedLoadsTableBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="7" class="px-4 py-8 text-center text-gray-500">Loading loads...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- Modal for Review Request/Quote -->
<div id="reviewModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-xl font-semibold text-gray-800"></h3>
                <button onclick="SalesApp.closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="modalContent" class="mb-4"></div>
            <div id="modalDateSection" class="mb-4 hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">Update Dates</label>
                <div class="mb-2">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Pickup Date (Requested)</label>
                    <input type="date" id="modalPickupDate" readonly class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 cursor-not-allowed">
                </div>
                <div class="mb-2">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Delivery Date</label>
                    <input type="date" id="modalDeliveryDate" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            <div id="modalNotesSection" class="mb-4 hidden">
                <label id="modalNotesLabel" class="block text-sm font-medium text-gray-700 mb-1"></label>
                <textarea id="modalNotes" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <div class="flex justify-end space-x-3">
                    <button id="modalAcceptBtn" onclick="SalesApp.handleModalAction('accept')" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 hidden">Accept</button>
                    <button id="modalDenyBtn" onclick="SalesApp.handleModalAction('deny')" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 hidden">Deny</button>
                    <button onclick="SalesApp.closeModal()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for Confirmation -->
<div id="confirmationModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-[60]">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="confirmationModalTitle" class="text-xl font-semibold text-gray-800">Confirm</h3>
                <button id="closeConfirmationModalBtn" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="confirmationModalContent" class="mb-4">
                <p class="text-gray-700"></p>
            </div>
            <div class="flex justify-end space-x-3">
                <button id="confirmationCancelBtn" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400">Cancel</button>
                <button id="confirmationOkBtn" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">OK</button>

</div>

<!-- Modal for Status Update -->
<div id="statusModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="statusModalTitle" class="text-xl font-semibold text-gray-800">Update Status</h3>
                <button onclick="SalesApp.closeStatusModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="statusModalReason" class="mb-4 hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Reason *</label>
                <textarea id="statusReason" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="Enter reason..."></textarea>
            </div>
            <div class="flex justify-end space-x-3">
                    <button onclick="SalesApp.closeStatusModal()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400">Cancel</button>
                    <button onclick="SalesApp.confirmStatusUpdate()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script>
    // SalesApp namespace to avoid collisions
    const SalesApp = (function() {
        // Utility: Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Build tooltip text from load notes
        function buildRefTooltip(load) {
            const parts = [];
            if (load.Delay_Reason && load.Delay_Reason.trim()) {
                parts.push('Delay Reason: ' + load.Delay_Reason.trim());
            }
            if (load.Cancel_Reason && load.Cancel_Reason.trim()) {
                parts.push('Cancel Reason: ' + load.Cancel_Reason.trim());
            }
            if (load.Deny_Quote_Reason && load.Deny_Quote_Reason.trim()) {
                parts.push('Deny Quote Reason: ' + load.Deny_Quote_Reason.trim());
            }
            if (load.Other_Notes && load.Other_Notes.trim()) {
                parts.push('Other Notes: ' + load.Other_Notes.trim());
            }
            return parts.length > 0 ? parts.join('\n') : '';
        }

        // Private variables
        let salesCurrentLoadId = null;
        let salesCurrentAction = null;
        let salesCurrentStatusAction = null;
        let salesLoadsData = [];
        let salesLastRenderedData = null; // Track last rendered data to prevent unnecessary re-renders
        let salesRequestedPickupDate = null;
        let salesCurrentDeliveryDate = null;
        let salesOriginalDeliveryDate = null;

        // Toggle form visibility
        function toggleForm() {
            const form = document.getElementById('loadForm');
            const icon = document.getElementById('formToggleIcon');
            form.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        // Calculate RPM
        function calculateRPM() {
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const miles = parseFloat(document.getElementById('miles').value) || 0;
            const rpmDisplay = document.getElementById('rpmDisplay');
            const rpmValue = document.getElementById('rpmValue');

            if (rate > 0 && miles > 0) {
                const rpm = (rate / miles).toFixed(2);
                rpmValue.textContent = '$' + rpm;
                rpmDisplay.classList.remove('hidden');
            } else {
                rpmDisplay.classList.add('hidden');
            }
        }

        // Tab switching
        function switchSalesTab(tab) {
            const activeTab = document.getElementById('activeLoadsTab');
            const completedTab = document.getElementById('completedLoadsTab');
            const tabActiveBtn = document.getElementById('tabActive');
            const tabCompletedBtn = document.getElementById('tabCompleted');

            if (tab === 'active') {
                activeTab.classList.remove('hidden');
                completedTab.classList.add('hidden');
                tabActiveBtn.classList.add('text-blue-600', 'border-blue-600');
                tabActiveBtn.classList.remove('text-gray-500', 'border-transparent');
                tabCompletedBtn.classList.remove('text-blue-600', 'border-blue-600');
                tabCompletedBtn.classList.add('text-gray-500', 'border-transparent');
            } else {
                activeTab.classList.add('hidden');
                completedTab.classList.remove('hidden');
                tabCompletedBtn.classList.add('text-blue-600', 'border-blue-600');
                tabCompletedBtn.classList.remove('text-gray-500', 'border-transparent');
                tabActiveBtn.classList.remove('text-blue-600', 'border-blue-600');
                tabActiveBtn.classList.add('text-gray-500', 'border-transparent');
            }
        }

        // Show subtle loading indicator
        function showLoadingIndicator(tab) {
            const indicator = tab === 'active' 
                ? document.getElementById('activeLoadsLoading')
                : document.getElementById('completedLoadsLoading');
            if (indicator) {
                indicator.classList.remove('opacity-0');
                indicator.classList.add('opacity-100');
            }
        }

        // Hide loading indicator
        function hideLoadingIndicator(tab) {
            const indicator = tab === 'active' 
                ? document.getElementById('activeLoadsLoading')
                : document.getElementById('completedLoadsLoading');
            if (indicator) {
                indicator.classList.remove('opacity-100');
                indicator.classList.add('opacity-0');
            }
        }

        // Load initial data
        function loadInitialData(isBackgroundRefresh) {
            if (!isBackgroundRefresh) {
                showLoadingIndicator('active');
                showLoadingIndicator('completed');
            }
            
            google.script.run
                .withSuccessHandler(function(data) {
                    onDataLoaded(data, isBackgroundRefresh);
                })
                .withFailureHandler(onError)
                .getSalesInitialData();
        }

        function onDataLoaded(data, isBackgroundRefresh) {
            // Populate customer dropdown (only on initial load)
            if (!isBackgroundRefresh) {
                const customerSelect = document.getElementById('customer');
                customerSelect.innerHTML = '<option value="">Select Customer</option>';
                data.customers.forEach(customer => {
                    const option = document.createElement('option');
                    option.value = customer;
                    option.textContent = customer;
                    customerSelect.appendChild(option);
                });
            }

            // Populate loads data
            salesLoadsData = data.loads;
            renderLoadsTables();
            
            if (!isBackgroundRefresh) {
                hideLoadingIndicator('active');
                hideLoadingIndicator('completed');
            }
        }

        function renderLoadsTables() {
            // NEW (Explicitly includes Quote Submitted)
            const activeLoads = salesLoadsData.filter(l => 
              ['Available', 'Covered', 'Loaded', 'Delayed', 'Pending Approval', 'Quote Submitted', 'Pre-Approval'].includes(l.Status || '')
            );
            
            // Completed loads: Delivered, Canceled, TONU
            const completedStatuses = ['Delivered', 'Canceled', 'TONU'];
            const completedLoads = salesLoadsData.filter(load => completedStatuses.includes(load.Status || ''));
            
            // Only re-render if data actually changed (prevent flicker during background refresh)
            const currentDataHash = JSON.stringify({ active: activeLoads.map(l => l.ID), completed: completedLoads.map(l => l.ID) });
            if (salesLastRenderedData === currentDataHash) {
                return; // Data hasn't changed, skip re-render
            }
            salesLastRenderedData = currentDataHash;
            
            renderActiveLoads(activeLoads);
            renderCompletedLoads(completedLoads);
        }

        function renderActiveLoads(loads) {
            const tbody = document.getElementById('activeLoadsTableBody');
            
            if (loads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-500">No active loads found.</td></tr>';
                return;
            }

            tbody.innerHTML = loads.map(load => {
                const route = `${load.PU_City || ''}, ${load.PU_State || ''} → ${load.Del_City || ''}, ${load.Del_State || ''}`;
                const dates = `${load.PU_Date || 'N/A'} / ${load.Del_Date || 'N/A'}`;
                const rateRpm = `$${load.Rate || '0.00'} / $${load.RPM || '0.00'}`;
                const status = load.Status || 'Available';
                
                // Determine row styling
                let rowClass = '';
                if (status === 'Delayed' || status === 'Canceled') {
                    rowClass = 'bg-red-50';
                }

                // Determine action button/dropdown
                let actionButton = '';
                if (status === 'Available') {
                    actionButton = `<button onclick="SalesApp.editLoad('${load.ID}')" class="text-blue-600 hover:text-blue-800">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </button>`;
                } else if (status === 'Pending Approval') {
                    actionButton = `<button onclick="SalesApp.reviewRequest('${load.ID}')" class="px-4 py-2 bg-yellow-500 text-white rounded-md hover:bg-yellow-600 pulsing">
                        Review Request
                    </button>`;
                } else if (status === 'Quote Submitted') {
                    actionButton = `<button onclick="SalesApp.reviewQuote('${load.ID}')" class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">
                        Review Quote
                    </button>`;
                } else if (status === 'Covered' || status === 'Loaded' || status === 'Delayed') {
                    // Action dropdown for Covered, Loaded, Delayed
                    actionButton = `<select onchange="SalesApp.handleStatusChange('${load.ID}', this.value)" class="text-xs border border-gray-300 rounded-md px-2 py-1 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Action</option>
                        <option value="Mark Loaded">Mark Loaded</option>
                        <option value="Mark Delivered">Mark Delivered</option>
                        <option value="Report Delay">Report Delay</option>
                        <option value="Cancel">Cancel</option>
                    </select>`;
                }

                const tooltip = buildRefTooltip(load);
                const tooltipAttr = tooltip ? ` title="${escapeHtml(tooltip)}"` : '';

                return `
                    <tr class="${rowClass}">
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${load.ID || ''}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900"${tooltipAttr}>${load.Load_Ref_Number || ''}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${load.Customer_Name || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${route}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${dates}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${rateRpm}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm">
                            <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusColor(status)}">
                                ${status}
                            </span>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm">${actionButton}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderCompletedLoads(loads) {
            const tbody = document.getElementById('completedLoadsTableBody');
            
            if (loads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">No completed loads found.</td></tr>';
                return;
            }

            tbody.innerHTML = loads.map(load => {
                const route = `${load.PU_City || ''}, ${load.PU_State || ''} → ${load.Del_City || ''}, ${load.Del_State || ''}`;
                const dates = `${load.PU_Date || 'N/A'} / ${load.Del_Date || 'N/A'}`;
                const rateRpm = `$${load.Rate || '0.00'} / $${load.RPM || '0.00'}`;
                const status = load.Status || '';
                
                // Determine row styling
                let rowClass = '';
                if (status === 'Canceled') {
                    rowClass = 'bg-red-50';
                }

                const tooltip = buildRefTooltip(load);
                const tooltipAttr = tooltip ? ` title="${escapeHtml(tooltip)}"` : '';

                return `
                    <tr class="${rowClass}">
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${load.ID || ''}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900"${tooltipAttr}>${load.Load_Ref_Number || ''}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${load.Customer_Name || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${route}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${dates}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${rateRpm}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm">
                            <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusColor(status)}">
                                ${status}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getStatusColor(status) {
            const colors = {
                'Available': 'bg-green-100 text-green-800',
                'Pending Approval': 'bg-yellow-100 text-yellow-800',
                'Quote Submitted': 'bg-blue-100 text-blue-800',
                'Covered': 'bg-purple-100 text-purple-800',
                'Loaded': 'bg-indigo-100 text-indigo-800',
                'Delayed': 'bg-red-100 text-red-800',
                'Delivered': 'bg-green-100 text-green-800',
                'Canceled': 'bg-red-100 text-red-800',
                'TONU': 'bg-gray-100 text-gray-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }

        // Review Request
        function reviewRequest(loadId) {
            const load = salesLoadsData.find(l => l.ID === loadId);
            if (!load) return;

            salesCurrentLoadId = loadId;
            const modal = document.getElementById('reviewModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const acceptBtn = document.getElementById('modalAcceptBtn');
            const denyBtn = document.getElementById('modalDenyBtn');
            const notesSection = document.getElementById('modalNotesSection');
            const notesLabel = document.getElementById('modalNotesLabel');
            const notesField = document.getElementById('modalNotes');

            modalTitle.textContent = 'Review Load Request from ' + escapeHtml(load.Assigned_Dispatcher || 'Dispatcher');
            modalContent.innerHTML = `
                <p class="text-gray-700 mb-2"><strong>Ref#</strong> ${escapeHtml(load.Load_Ref_Number || '—')} &nbsp; <strong>McLeod#</strong> ${load.McLeod_Order_ID ? escapeHtml(String(load.McLeod_Order_ID).padStart(7, '0')) : '—'}</p>
                <p class="text-gray-700 mb-2"><strong>Route:</strong> ${load.PU_City || ''}, ${load.PU_State || ''} → ${load.Del_City || ''}, ${load.Del_State || ''}</p>
                <p class="text-gray-700 mb-2"><strong>Dispatcher:</strong> ${load.Assigned_Dispatcher || 'N/A'}</p>
                <p class="text-gray-700 mb-2"><strong>Proposed Truck:</strong> ${load.Truck_Number || 'N/A'}</p>
                <p class="text-gray-700 mb-2"><strong>Proposed Driver:</strong> ${load.Driver_Name || 'N/A'}</p>
            `;
            
            notesSection.classList.remove('hidden');
            notesLabel.textContent = 'Add any notes (optional):';
            notesField.value = '';
            notesField.required = false;
            
            acceptBtn.classList.remove('hidden');
            denyBtn.classList.remove('hidden');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // Review Quote
        function reviewQuote(loadId) {
            const load = salesLoadsData.find(l => l.ID === loadId);
            if (!load) return;

            salesCurrentLoadId = loadId;
            const modal = document.getElementById('reviewModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const acceptBtn = document.getElementById('modalAcceptBtn');
            const denyBtn = document.getElementById('modalDenyBtn');
            const notesSection = document.getElementById('modalNotesSection');
            const notesLabel = document.getElementById('modalNotesLabel');
            const notesField = document.getElementById('modalNotes');

            modalTitle.textContent = 'Review Quote';
            
            // Extract requested pickup date from Reason_Log
            let requestedPickupDate = 'N/A';
            let requestedPickupDateISO = null; // Store in YYYY-MM-DD format for date input
            if (load.Reason_Log) {
                // Look for the most recent "Quote:" entry in Reason_Log
                const lines = load.Reason_Log.split('\n');
                for (let i = lines.length - 1; i >= 0; i--) {
                    if (lines[i].includes('Quote:')) {
                        const quoteMatch = lines[i].match(/Quote:\s*(.+)/);
                        if (quoteMatch && quoteMatch[1]) {
                            const quoteText = quoteMatch[1].trim();
                            // Try to extract date from "Requested Pickup Date Change to MM/dd/yyyy" or "MM/dd/yyyy"
                            // More flexible regex to handle single or double digit months/days
                            const dateMatch = quoteText.match(/Requested Pickup Date Change to\s+(\d{1,2}\/\d{1,2}\/\d{4})/i);
                            if (dateMatch && dateMatch[1]) {
                                // Parse MM/dd/yyyy or M/d/yyyy and convert to YYYY-MM-DD
                                const dateParts = dateMatch[1].split('/');
                                if (dateParts.length === 3) {
                                    const month = dateParts[0].padStart(2, '0');
                                    const day = dateParts[1].padStart(2, '0');
                                    const year = dateParts[2];
                                    requestedPickupDateISO = `${year}-${month}-${day}`;
                                    requestedPickupDate = requestedPickupDateISO;
                                } else {
                                    requestedPickupDate = dateMatch[1];
                                }
                            } else {
                                // Fallback: try to extract any date format (MM/dd/yyyy or YYYY-MM-DD)
                                const fallbackMatch = quoteText.match(/(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{4})/);
                                if (fallbackMatch) {
                                    const dateStr = fallbackMatch[1] || fallbackMatch[2];
                                    if (dateStr.includes('-')) {
                                        // Already in YYYY-MM-DD format
                                        requestedPickupDate = dateStr;
                                        requestedPickupDateISO = dateStr;
                                    } else if (dateStr.includes('/')) {
                                        // MM/dd/yyyy format
                                        const dateParts = dateStr.split('/');
                                        if (dateParts.length === 3) {
                                            const month = dateParts[0].padStart(2, '0');
                                            const day = dateParts[1].padStart(2, '0');
                                            const year = dateParts[2];
                                            requestedPickupDateISO = `${year}-${month}-${day}`;
                                            requestedPickupDate = requestedPickupDateISO;
                                        } else {
                                            requestedPickupDate = dateStr;
                                        }
                                    } else {
                                        requestedPickupDate = dateStr;
                                    }
                                } else {
                                    requestedPickupDate = quoteText;
                                }
                            }
                        }
                        break;
                    }
                }
            }
            
            // Store in state for later use
            salesRequestedPickupDate = requestedPickupDateISO;
            salesCurrentDeliveryDate = load.Del_Date || '';

            // Format dates for display
            const puDate = load.PU_Date || 'N/A';
            const delDate = load.Del_Date || 'N/A';
            const rate = load.Rate || '0.00';
            const rpm = load.RPM || '0.00';
            const miles = load.Miles || '0.00';

            // Format requested pickup date with weekday: "Weekday: mm/dd/yyyy"
            let formattedRequestedDate = 'N/A';
            if (requestedPickupDateISO) {
                try {
                    const dateObj = new Date(requestedPickupDateISO + 'T00:00:00'); // Add time to avoid timezone issues
                    if (!isNaN(dateObj.getTime())) {
                        const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                        const weekday = weekdays[dateObj.getDay()];
                        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                        const day = String(dateObj.getDate()).padStart(2, '0');
                        const year = dateObj.getFullYear();
                        formattedRequestedDate = `${weekday}: ${month}/${day}/${year}`;
                    }
                } catch (e) {
                    console.error('Error formatting date:', e);
                    formattedRequestedDate = requestedPickupDate;
                }
            } else if (requestedPickupDate && requestedPickupDate !== 'N/A') {
                formattedRequestedDate = requestedPickupDate;
            }

            modalContent.innerHTML = `
                <p class="text-gray-700 mb-2"><strong>Customer Name:</strong> ${load.Customer_Name || 'N/A'}</p>
                <p class="text-gray-700 mb-0">
                    <strong>Route:</strong> ${load.PU_City || ''}, ${load.PU_State || ''} → ${load.Del_City || ''}, ${load.Del_State || ''}
                    <div class="text-sm text-gray-500 mt-0.5 mb-4">Pickup: ${puDate} | Delivery: ${delDate}</div>
                </p>
                <p class="text-gray-700 mb-2"><strong>Rate:</strong> $${rate} | <strong>RPM:</strong> $${rpm} | <strong>Miles:</strong> ${miles}</p>
                <p class="text-gray-700 mb-2"><strong>Requested Pickup Date:</strong> ${formattedRequestedDate}</p>
            `;
            
            notesSection.classList.remove('hidden');
            notesLabel.textContent = 'Add any notes (optional):';
            notesField.value = '';
            notesField.required = false;
            
            acceptBtn.classList.remove('hidden');
            denyBtn.classList.remove('hidden');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // Edit Load
        function editLoad(loadId) {
            // TODO: Implement edit functionality in future phase
            alert('Edit functionality coming soon!');
        }

        // Modal actions
        function handleModalAction(action) {
            if (!salesCurrentLoadId) return;

            salesCurrentAction = action;
            const notesField = document.getElementById('modalNotes');
            if (!notesField) {
                console.error('Notes field not found in modal');
                alert('Error: Notes field not available.');
                return;
            }
            
            const notes = notesField.value.trim();
            
            if (action === 'deny' && !notes) {
                alert('Please provide a reason for denial.');
                notesField.focus();
                return;
            }

            // Special handling for quote acceptance - show date fields
            if (action === 'accept' && salesCurrentAction === 'quote') {
                // Check if we have a requested pickup date
                if (!salesRequestedPickupDate) {
                    alert('Error: Requested pickup date not found. Cannot accept quote.');
                    return;
                }
                
                // Show date fields section
                const dateSection = document.getElementById('modalDateSection');
                const pickupDateInput = document.getElementById('modalPickupDate');
                const deliveryDateInput = document.getElementById('modalDeliveryDate');
                const acceptBtn = document.getElementById('modalAcceptBtn');
                
                if (dateSection && pickupDateInput && deliveryDateInput) {
                    dateSection.classList.remove('hidden');
                    pickupDateInput.value = salesRequestedPickupDate;
                    deliveryDateInput.value = salesCurrentDeliveryDate || '';
                    
                    // Change Accept button to "Confirm Dates"
                    acceptBtn.textContent = 'Confirm Dates';
                    acceptBtn.onclick = () => confirmQuoteAcceptance();
                    
                    // Store original delivery date for comparison
                    salesOriginalDeliveryDate = salesCurrentDeliveryDate || '';
                    
                    return; // Don't submit yet, wait for confirmation
                }
            }

            // Regular submission for non-quote acceptances or denials
            google.script.run
                .withSuccessHandler(onDecisionHandled)
                .withFailureHandler(onError)
                .handleSalesDecision(salesCurrentLoadId, action, notes || '');
        }

        function confirmQuoteAcceptance() {
            if (!salesCurrentLoadId || !salesRequestedPickupDate) {
                alert('Error: Missing required information.');
                return;
            }

            const pickupDateInput = document.getElementById('modalPickupDate');
            const deliveryDateInput = document.getElementById('modalDeliveryDate');
            const notesField = document.getElementById('modalNotes');
            
            if (!pickupDateInput || !deliveryDateInput) {
                alert('Error: Date fields not found.');
                return;
            }

            const requestedPickupDate = pickupDateInput.value;
            const newDeliveryDate = deliveryDateInput.value;
            const notes = notesField ? notesField.value.trim() : '';

            // Validate dates
            if (!requestedPickupDate) {
                alert('Error: Pickup date is required.');
                return;
            }

            if (!newDeliveryDate) {
                alert('Error: Delivery date is required.');
                deliveryDateInput.focus();
                return;
            }

            // Check if delivery date is unchanged
            const originalDeliveryDate = salesOriginalDeliveryDate || '';
            const deliveryDateUnchanged = newDeliveryDate === originalDeliveryDate;

            if (deliveryDateUnchanged) {
                // Show custom confirmation modal instead of browser confirm
                showConfirmationModal(
                    'Keep Delivery Date with No Changes?',
                    () => {
                        // User confirmed - proceed with submission
                        submitQuoteWithDates(requestedPickupDate, newDeliveryDate, notes);
                    }
                );
                return; // Wait for user response
            }

            // Delivery date changed, proceed directly
            submitQuoteWithDates(requestedPickupDate, newDeliveryDate, notes);
        }

        function submitQuoteWithDates(requestedPickupDate, newDeliveryDate, notes) {
            google.script.run
                .withSuccessHandler(function(result) {
                    if (result.success) {
                        alert('Quote accepted and dates updated!');
                        closeModal();
                        loadInitialData(false);
                    } else {
                        alert('Error: ' + result.error);
                    }
                })
                .withFailureHandler(onError)
                .handleSalesDecision(salesCurrentLoadId, 'accept', notes || '', requestedPickupDate, newDeliveryDate);
        }

        function showConfirmationModal(message, onConfirm) {
            const modal = document.getElementById('confirmationModal');
            const content = document.getElementById('confirmationModalContent');
            const okBtn = document.getElementById('confirmationOkBtn');
            const cancelBtn = document.getElementById('confirmationCancelBtn');
            const closeBtn = document.getElementById('closeConfirmationModalBtn');

            content.innerHTML = `<p class="text-gray-700">${message}</p>`;
            
            // Remove existing event listeners by cloning
            const newOkBtn = okBtn.cloneNode(true);
            const newCancelBtn = cancelBtn.cloneNode(true);
            okBtn.parentNode.replaceChild(newOkBtn, okBtn);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);

            // Add new event listeners
            newOkBtn.addEventListener('click', () => {
                closeConfirmationModal();
                if (onConfirm) onConfirm();
            });
            newCancelBtn.addEventListener('click', closeConfirmationModal);
            closeBtn.onclick = closeConfirmationModal;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeConfirmationModal() {
            const modal = document.getElementById('confirmationModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function onDecisionHandled(result) {
            if (result.success) {
                alert(salesCurrentAction === 'accept' ? 'Request accepted!' : 'Request denied.');
                closeModal();
                loadInitialData(false); // Immediate refresh after action
            } else {
                alert('Error: ' + result.error);
            }
        }

        function closeModal() {
            const modal = document.getElementById('reviewModal');
            const notesSection = document.getElementById('modalNotesSection');
            const notesField = document.getElementById('modalNotes');
            const dateSection = document.getElementById('modalDateSection');
            const acceptBtn = document.getElementById('modalAcceptBtn');
            
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            notesSection.classList.add('hidden');
            if (dateSection) dateSection.classList.add('hidden');
            if (notesField) notesField.value = '';
            
            // Reset Accept button
            if (acceptBtn) {
                acceptBtn.textContent = 'Accept';
                acceptBtn.setAttribute('onclick', "SalesApp.handleModalAction('accept')");
            }
            
            salesCurrentLoadId = null;
            salesCurrentAction = null;
            salesRequestedPickupDate = null;
            salesCurrentDeliveryDate = null;
            salesOriginalDeliveryDate = null;
        }

        // Status Update Modal
        function handleStatusChange(loadId, action) {
            if (!action) return;

            salesCurrentLoadId = loadId;
            salesCurrentStatusAction = action;

            const modal = document.getElementById('statusModal');
            const modalTitle = document.getElementById('statusModalTitle');
            const reasonDiv = document.getElementById('statusModalReason');
            const reasonInput = document.getElementById('statusReason');

            // Reset dropdown
            event.target.value = '';

            if (action === 'Report Delay') {
                modalTitle.textContent = 'Report Delay';
                reasonDiv.classList.remove('hidden');
                reasonInput.value = '';
                reasonInput.required = true;
            } else if (action === 'Mark Loaded') {
                modalTitle.textContent = 'Mark as Loaded';
                reasonDiv.classList.add('hidden');
                reasonInput.required = false;
            } else if (action === 'Mark Delivered') {
                modalTitle.textContent = 'Mark as Delivered';
                reasonDiv.classList.add('hidden');
                reasonInput.required = false;
            } else if (action === 'Cancel') {
                modalTitle.textContent = 'Cancel Load';
                reasonDiv.classList.remove('hidden');
                reasonInput.value = '';
                reasonInput.required = true;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeStatusModal() {
            const modal = document.getElementById('statusModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            salesCurrentLoadId = null;
            salesCurrentStatusAction = null;
        }

        function confirmStatusUpdate() {
            const reasonInput = document.getElementById('statusReason');
            const reason = reasonInput.value.trim();

            if ((salesCurrentStatusAction === 'Report Delay' || salesCurrentStatusAction === 'Cancel') && !reason) {
                alert('Please provide a reason.');
                return;
            }

            let newStatus = '';
            if (salesCurrentStatusAction === 'Mark Loaded') {
                newStatus = 'Loaded';
            } else if (salesCurrentStatusAction === 'Mark Delivered') {
                newStatus = 'Delivered';
            } else if (salesCurrentStatusAction === 'Report Delay') {
                newStatus = 'Delayed';
            } else if (salesCurrentStatusAction === 'Cancel') {
                newStatus = 'Canceled';
            }

            google.script.run
                .withSuccessHandler(onStatusUpdated)
                .withFailureHandler(onError)
                .updateLoadStatus(salesCurrentLoadId, newStatus, reason || null);
        }

        function onStatusUpdated(result) {
            if (result.success) {
                alert('Status updated successfully!');
                closeStatusModal();
                loadInitialData(false); // Immediate refresh after action
            } else {
                alert('Error: ' + result.error);
            }
        }

        function onError(error) {
            console.error('Error:', error);
            alert('An error occurred: ' + error.message);
            hideLoadingIndicator('active');
            hideLoadingIndicator('completed');
        }

        // Public API
        return {
            toggleForm,
            calculateRPM,
            switchSalesTab,
            loadInitialData,
            renderLoadsTables,
            reviewRequest,
            reviewQuote,
            editLoad,
            handleModalAction,
            closeModal,
            handleStatusChange,
            closeStatusModal,
            confirmStatusUpdate,
            confirmQuoteAcceptance,
            showConfirmationModal,
            closeConfirmationModal
        };
    })();

    // Handle form submission
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('newLoadForm');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const formData = {
                    customer: document.getElementById('customer').value,
                    loadRef: document.getElementById('loadRef').value,
                    puCity: document.getElementById('puCity').value,
                    puState: document.getElementById('puState').value,
                    puDate: document.getElementById('puDate').value,
                    delCity: document.getElementById('delCity').value,
                    delState: document.getElementById('delState').value,
                    delDate: document.getElementById('delDate').value,
                    rate: parseFloat(document.getElementById('rate').value),
                    miles: parseFloat(document.getElementById('miles').value),
                    notes: document.getElementById('notes').value
                };

                google.script.run
                    .withSuccessHandler(function(result) {
                        if (result.success) {
                            alert('Load created successfully!');
                            document.getElementById('newLoadForm').reset();
                            document.getElementById('rpmDisplay').classList.add('hidden');
                            SalesApp.loadInitialData(false); // Immediate refresh after action
                        } else {
                            alert('Error: ' + result.error);
                        }
                    })
                    .withFailureHandler(function(error) {
                        console.error('Error:', error);
                        alert('An error occurred: ' + error.message);
                    })
                    .createLoad(formData);
            });
        }

        // Load data on page load
        SalesApp.loadInitialData(false); // Initial load
        
        // Set up auto-refresh every 15 seconds
        setInterval(function() {
            SalesApp.loadInitialData(true); // Background refresh
        }, 15000);
    });

    // Expose functions globally for onclick handlers
    window.toggleForm = SalesApp.toggleForm;
    window.calculateRPM = SalesApp.calculateRPM;
    window.switchSalesTab = SalesApp.switchSalesTab;
    window.editLoad = SalesApp.editLoad;
    window.reviewRequest = SalesApp.reviewRequest;
    window.reviewQuote = SalesApp.reviewQuote;
    window.handleModalAction = SalesApp.handleModalAction;
    window.closeModal = SalesApp.closeModal;
</script>
