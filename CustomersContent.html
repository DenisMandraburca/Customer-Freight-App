<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Customers List Section -->
    <div class="bg-white rounded-lg shadow-md">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-gray-800">Customer List</h2>
                <button 
                    onclick="loadCustomersData()"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors"
                >
                    Refresh
                </button>
            </div>

            <!-- Loading Indicator -->
            <div id="customersLoading" class="text-center py-8 opacity-0 transition-opacity">
                <div class="inline-block loader"></div>
                <p class="mt-2 text-gray-600">Loading customers...</p>
            </div>

            <!-- Customers Table -->
            <div id="customersTableContainer" class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Customer Name
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Type
                            </th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Customers will be populated here -->
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="customersEmpty" class="text-center py-12 hidden">
                <p class="text-gray-500">No customers found.</p>
            </div>
        </div>
    </div>
</main>

<style>
    .loader {
        border: 3px solid #f3f4f6;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<script>
    // Load customers data
    function loadCustomersData() {
        const loadingIndicator = document.getElementById('customersLoading');
        const tableContainer = document.getElementById('customersTableContainer');
        const emptyState = document.getElementById('customersEmpty');
        const tableBody = document.getElementById('customersTableBody');

        // Show loading
        loadingIndicator.classList.remove('opacity-0');
        loadingIndicator.classList.add('opacity-100');
        tableContainer.classList.add('hidden');
        emptyState.classList.add('hidden');

        google.script.run
            .withSuccessHandler(function(result) {
                loadingIndicator.classList.remove('opacity-100');
                loadingIndicator.classList.add('opacity-0');

                if (result.success && result.data && result.data.customers) {
                    const customers = result.data.customers;
                    
                    if (customers.length === 0) {
                        emptyState.classList.remove('hidden');
                        tableContainer.classList.add('hidden');
                    } else {
                        emptyState.classList.add('hidden');
                        tableContainer.classList.remove('hidden');
                        
                        // Clear existing rows
                        tableBody.innerHTML = '';
                        
                        // Populate table
                        customers.forEach(function(customer) {
                            const row = document.createElement('tr');
                            row.className = 'hover:bg-gray-50';
                            
                            const nameCell = document.createElement('td');
                            nameCell.className = 'px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900';
                            nameCell.textContent = customer.Customer_Name || '';
                            
                            const typeCell = document.createElement('td');
                            typeCell.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
                            typeCell.textContent = customer.Type || '';
                            
                            row.appendChild(nameCell);
                            row.appendChild(typeCell);
                            tableBody.appendChild(row);
                        });
                    }
                } else {
                    emptyState.classList.remove('hidden');
                    tableContainer.classList.add('hidden');
                    showToast('Error loading customers: ' + (result.error || 'Unknown error'), 'error');
                }
            })
            .withFailureHandler(function(error) {
                loadingIndicator.classList.remove('opacity-100');
                loadingIndicator.classList.add('opacity-0');
                emptyState.classList.remove('hidden');
                tableContainer.classList.add('hidden');
                showToast('Error loading customers: ' + error.message, 'error');
            })
            .getAllCustomers();
    }

    // Toast notification function (if not already defined globally)
    function showToast(message, type) {
        type = type || 'info';
        const toast = document.createElement('div');
        toast.className = 'fixed top-4 right-4 px-6 py-3 rounded-md shadow-lg z-50 ' + 
            (type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500') + 
            ' text-white';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(function() {
            toast.style.transition = 'opacity 0.3s';
            toast.style.opacity = '0';
            setTimeout(function() {
                document.body.removeChild(toast);
            }, 300);
        }, 3000);
    }

    // Load data on page load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadCustomersData);
    } else {
        loadCustomersData();
    }
</script>
