<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Freight App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulsing {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        .toast-success {
            background-color: #10b981;
        }
        .toast-error {
            background-color: #ef4444;
        }
        .toast-info {
            background-color: #3b82f6;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .loader {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <!-- Left Sidebar -->
        <aside class="w-64 bg-gray-800 text-white h-screen fixed left-0 top-0 overflow-y-auto">
            <!-- User Profile -->
            <div class="p-6 border-b border-gray-700">
                <h2 class="text-xl font-bold mb-2">Customer Freight App</h2>
                <div class="text-sm text-gray-300">
                    <div class="font-semibold text-white"><?= userName ?></div>
                </div>
            </div>

            <!-- Navigation Menu -->
            <nav class="p-4">
                <button 
                    id="navManager" 
                    onclick="switchMainView('manager')"
                    class="w-full text-left px-4 py-3 mb-2 rounded-md bg-gray-700 text-white font-medium hover:bg-gray-600 transition-colors"
                >
                    Manager
                </button>
                <button 
                    id="navAccountManager" 
                    onclick="switchMainView('accountmanager')"
                    class="w-full text-left px-4 py-3 mb-2 rounded-md bg-gray-800 text-gray-300 font-medium hover:bg-gray-700 hover:text-white transition-colors"
                >
                    Account Manager
                </button>
                <button 
                    id="navDispatcher" 
                    onclick="switchMainView('dispatcher')"
                    class="w-full text-left px-4 py-3 mb-2 rounded-md bg-gray-800 text-gray-300 font-medium hover:bg-gray-700 hover:text-white transition-colors"
                >
                    Dispatcher
                </button>
                <button 
                    id="navReports" 
                    onclick="switchMainView('reports')"
                    class="w-full text-left px-4 py-3 rounded-md bg-gray-800 text-gray-300 font-medium hover:bg-gray-700 hover:text-white transition-colors"
                >
                    Reports
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 ml-64">
            <!-- Header -->
            <header class="bg-white shadow-md">
                <div class="px-4 sm:px-6 lg:px-8 py-4">
                    <div class="flex justify-between items-center">
                        <h1 class="text-2xl font-bold text-gray-800">Customer Freight App</h1>
                        <div class="text-lg text-gray-600">
                            Welcome, <span class="font-semibold text-gray-800"><?= userName ?></span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Toast Container -->
            <div id="toastContainer"></div>

            <!-- Global Loader -->
            <div id="globalLoader" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
                <div class="bg-white rounded-lg p-8 flex items-center space-x-4">
                    <div class="loader"></div>
                    <span class="text-gray-700">Loading...</span>
                </div>
            </div>

            <!-- Manager View -->
            <div id="view-manager" class="min-h-screen">
                <?!= include('UnifiedContent') ?>
            </div>

            <!-- Account Manager View -->
            <div id="view-accountmanager" class="min-h-screen hidden">
                <?!= include('AccountManagerContent') ?>
            </div>

            <!-- Dispatcher View -->
            <div id="view-dispatcher" class="min-h-screen hidden">
                <?!= include('DispatcherUnifiedContent') ?>
            </div>

            <!-- Reports View -->
            <div id="view-reports" class="min-h-screen hidden">
                <div class="p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Reports</h2>
                    <div class="bg-white rounded-lg shadow p-6">
                        <p class="text-gray-600">Reports content will be displayed here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Main view switching logic
        function switchMainView(view) {
            const managerView = document.getElementById('view-manager');
            const accountManagerView = document.getElementById('view-accountmanager');
            const dispatcherView = document.getElementById('view-dispatcher');
            const reportsView = document.getElementById('view-reports');
            const managerBtn = document.getElementById('navManager');
            const accountManagerBtn = document.getElementById('navAccountManager');
            const dispatcherBtn = document.getElementById('navDispatcher');
            const reportsBtn = document.getElementById('navReports');

            // Hide all views
            managerView.classList.add('hidden');
            accountManagerView.classList.add('hidden');
            dispatcherView.classList.add('hidden');
            reportsView.classList.add('hidden');

            // Reset all buttons to inactive state
            managerBtn.classList.remove('bg-gray-700', 'text-white');
            managerBtn.classList.add('bg-gray-800', 'text-gray-300');
            accountManagerBtn.classList.remove('bg-gray-700', 'text-white');
            accountManagerBtn.classList.add('bg-gray-800', 'text-gray-300');
            dispatcherBtn.classList.remove('bg-gray-700', 'text-white');
            dispatcherBtn.classList.add('bg-gray-800', 'text-gray-300');
            reportsBtn.classList.remove('bg-gray-700', 'text-white');
            reportsBtn.classList.add('bg-gray-800', 'text-gray-300');

            // Show selected view and activate button
            if (view === 'manager') {
                managerView.classList.remove('hidden');
                managerBtn.classList.remove('bg-gray-800', 'text-gray-300');
                managerBtn.classList.add('bg-gray-700', 'text-white');
            } else if (view === 'accountmanager') {
                accountManagerView.classList.remove('hidden');
                accountManagerBtn.classList.remove('bg-gray-800', 'text-gray-300');
                accountManagerBtn.classList.add('bg-gray-700', 'text-white');
            } else if (view === 'dispatcher') {
                dispatcherView.classList.remove('hidden');
                dispatcherBtn.classList.remove('bg-gray-800', 'text-gray-300');
                dispatcherBtn.classList.add('bg-gray-700', 'text-white');
            } else if (view === 'reports') {
                reportsView.classList.remove('hidden');
                reportsBtn.classList.remove('bg-gray-800', 'text-gray-300');
                reportsBtn.classList.add('bg-gray-700', 'text-white');
            }
        }
    </script>
</body>
</html>
